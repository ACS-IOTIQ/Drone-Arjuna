services:

  # ── PostgreSQL + PostGIS ──────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: da_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dronearjuna}
      POSTGRES_USER: ${POSTGRES_USER:-da_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-da_admin} -d ${POSTGRES_DB:-dronearjuna}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── TimescaleDB (telemetry time-series) ──────────────────────────
  timescale:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: da_timescale
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-da_telemetry}
      POSTGRES_USER: ${POSTGRES_USER:-da_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - timescale_data:/home/postgres/pgdata/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-da_admin} -d ${TIMESCALE_DB:-da_telemetry}"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── PG Admin (Web UI For DB) ───────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: da_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@dronearjuna.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-changeme}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
      timescale:
        condition: service_healthy

  # ── Redis (cache + session) ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: da_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ (event bus) ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: da_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-da_mq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── MinIO (object storage: video, imagery) ────────────────────────
  minio:
    image: minio/minio:latest
    container_name: da_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-da_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-changeme123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"   # Console UI

  # ── Mailhog (dev email inbox) ─────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: da_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP — backend sends here
      - "8025:8025"   # Web UI — open http://localhost:8025 to read emails

  # ── FastAPI Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: da_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-da_admin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-dronearjuna}
      TIMESCALE_URL: postgresql+asyncpg://${POSTGRES_USER:-da_admin}:${POSTGRES_PASSWORD:-changeme}@timescale:5432/${TIMESCALE_DB:-da_telemetry}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-da_mq}:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      SECRET_KEY: ${SECRET_KEY:-please-change-this-secret-key-in-production}
    ports:
      - "8000:8000"
      - "14550:14550/udp"   # ArduPilot SITL / MAVLink UDP inbound
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach Windows host from container (SITL TCP)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app   # Hot reload in dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ── React Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: da_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
      VITE_API_PROXY_TARGET: http://backend:8000

volumes:
  postgres_data:
  timescale_data:
  pgadmin_data:
  redis_data:
  rabbitmq_data:
  minio_data:
